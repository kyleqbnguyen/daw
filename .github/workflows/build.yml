name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: ${{ github.event_name == 'pull_request' && 'RelWithDebInfo' || 'Release' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            cmake_flags: ""
          - os: ubuntu-latest
            name: Linux
            cmake_flags: ""
          - os: windows-latest
            name: Windows
            cmake_flags: ""

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            ninja-build \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libcurl4-openssl-dev \
            libgl1-mesa-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache ninja

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fc-cache
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

      - name: Restore ccache
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-

      - name: Reset ccache stats
        if: runner.os != 'Windows'
        run: |
          ccache --max-size=2G
          ccache --zero-stats

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.fc-cache
          ${{ matrix.cmake_flags }}

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: >
          cmake -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.fc-cache
          ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Show ccache stats
        if: runner.os != 'Windows'
        run: ccache --show-stats

      - name: Test
        run: ctest --test-dir build --build-config ${{ env.BUILD_TYPE }} --output-on-failure
